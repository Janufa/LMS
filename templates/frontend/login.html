{% extends 'frontend/base.html' %}
{% block title %}Login — Acadify Portal{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card form-card">
      <div class="card-body">
        <div class="mb-4 text-center">
          <h3 class="fw-bold">Welcome back</h3>
          <p class="text-muted">Sign in to access your learning dashboard.</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" autofocus required id="id_username" class="form-control" />
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" name="password" required id="id_password" class="form-control" />
          </div>
          <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
        </form>
        <p class="mt-4 text-center text-muted">Don’t have an account? <a href="{% url 'register' %}">Register now</a>.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
